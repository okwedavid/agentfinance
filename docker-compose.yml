services:
  redis:
    image: redis:7-alpine
    container_name: agentfinance-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    container_name: agentfinance-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentfinance
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentfinance-backend
    command: npm run start
    restart: unless-stopped
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/agentfinance
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret123456789
      PORT_BACKEND: 4000
      SEED_ON_START: 'true'
      PRISMA_CLIENT_ENGINE_TYPE: libquery_engine
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  websocket:
    build:
      context: ./websocket
      dockerfile: Dockerfile
    command: npm run dev
    restart: unless-stopped
    volumes:
      - ./websocket:/app:delegated
      - /app/node_modules
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:5000
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      websocket:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/_next/health || curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

volumes:
  db-data:
  node-modules-backend:
  node-modules-frontend: